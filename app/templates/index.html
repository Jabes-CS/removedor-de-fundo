<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Removedor de Fundo</title>

<style>

body{
font-family: Arial;
background:#f4f6f8;
text-align:center;
padding:40px;
}

.container{
background:white;
max-width:600px;
margin:auto;
padding:30px;
border-radius:12px;
box-shadow:0 10px 20px rgba(0,0,0,0.1);
}

.drop-area{
border:2px dashed #aaa;
padding:40px;
border-radius:10px;
cursor:pointer;
margin-bottom:20px;
}

.drop-area:hover{
border-color:#4CAF50;
}

button{
background:#4CAF50;
color:white;
border:none;
padding:12px 20px;
font-size:16px;
border-radius:6px;
cursor:pointer;
}

button:hover{
background:#43a047;
}

.preview img{
max-width:120px;
margin:10px;
}

.result img{
max-width:200px;
margin-top:20px;
}

</style>
</head>

<body>

<div class="container">

<h1>Removedor de Fundo</h1>

<div class="drop-area" onclick="fileInput.click()">
<p>Arraste imagens ou clique para selecionar</p>
<input type="file" id="fileInput" multiple hidden>
</div>

<div class="preview" id="preview"></div>

<button onclick="enviarImagens()">Remover Fundo</button>

<div class="result" id="resultado"></div>

</div>

<script>

const fileInput = document.getElementById("fileInput")
const preview = document.getElementById("preview")

fileInput.addEventListener("change", mostrarPreview)

function mostrarPreview(){

preview.innerHTML=""

const files = fileInput.files

for(const file of files){

const img = document.createElement("img")
img.src = URL.createObjectURL(file)

preview.appendChild(img)

}

}

async function enviarImagens(){

const files = fileInput.files

if(files.length === 0){
alert("Selecione pelo menos uma imagem")
return
}

for(const file of files){

const formData = new FormData()
formData.append("file", file)

const response = await fetch("/remover-fundo",{
method:"POST",
body:formData
})

const blob = await response.blob()

const url = URL.createObjectURL(blob)

const nomeOriginal = file.name.split(".")[0]
const novoNome = nomeOriginal + "_fundo_removido.png"

const container = document.createElement("div")

const img = document.createElement("img")
img.src = url
img.style.maxWidth = "200px"

const link = document.createElement("a")
link.href = url
link.download = novoNome

const botao = document.createElement("button")
botao.innerText = "Baixar"

link.appendChild(botao)

container.appendChild(img)
container.appendChild(document.createElement("br"))
container.appendChild(link)

document.getElementById("resultado").appendChild(container)

}

}

</script>

</body>
</html>
